<div class="logo">
  <a [routerLink]="['/', 'vinay-profile']" class="simple-text" (click)="closeMobileMenu()">
    <div class="logo-img">
      <img src="assets/img/favicon/apple-touch-icon.png" alt="vinayone logo" />
    </div>
    <span class="vinayone-logo">vinayone</span>
  </a>
</div>

<div class="sidebar-wrapper">
  <ul class="nav">
    @for (item of items(); track item.path) {
      <li
        class="nav-item"
        [class.active-pro]="item.highlighted"
        routerLinkActive="active"
      >
        <a class="nav-link" [routerLink]="['/', item.path]" (click)="closeMobileMenu()">
          <i class="material-icons">{{ item.icon }}</i>
          <p>{{ item.label }}</p>
        </a>
      </li>
    }
  </ul>
</div>
